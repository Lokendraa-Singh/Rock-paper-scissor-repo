<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>RockPaperScissor</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <p class="para">Rock Paper Scissor Game</p>

      <button class="btn" onclick="playGame('Rock')">
        <img
          class="image"
          src="images/Rock.png"
          alt="Rock"
        />
      </button>
      <button class="btn" onclick="playGame('Paper')">
        <img
          class="image"
          src="images/paper.png"
          alt="Paper"
        />
      </button>
      <button class="btn" onclick="playGame('Scissor')">
        <img
          class="image"
          src="images/Scissor.png"
          alt="Scissor"
        />
      </button>

      <p class="js-result"></p>
      <p class="js-moves"></p>
      <p class="js-score"></p>

      <button class="btns" onclick="ResetScore()">
        Reset Score
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
